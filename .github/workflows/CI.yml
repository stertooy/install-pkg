name: CI

# Trigger the workflow on push to master / main, or on pull request
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: 

jobs:
  test:
    name: "Test on ${{ matrix.os }}, GAP version ${{ matrix.gap-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        gap-version:
          - 'devel'
          - '4.14'
    steps:
      # TODO: replace by gap-actions repository when merged
      - name: "Setup Cygwin"
        uses: stertooy/setup-cygwin@install-jq-and-bsdtar
        if: ${{ matrix.os == 'windows-latest' }}
        
      - name: "Check out this repository"
        uses: actions/checkout@v6
        with:
          path: this-action/
          
      - name: "Setup GAP"
        uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
          
      - name: "Install additional GAP packages"
        uses: ./this-action/
        with:
          packages: |
            SmallClassNr@devel
            gap-packages/AutoDoc
            POLYCYCLIC
            groupoids@1.80
            gap-packages/utils@0.92
            https://github.com/gap-packages/grpconst/releases/download/v2.6.2/grpconst-2.6.2.tar.gz
            https://github.com/gap-packages/forms/releases/download/v1.2.14/forms-1.2.14.zip

      - name: "Check if packages were installed"
        shell: bash
        run: |
          $GAP -A <<GAPInput
            chck := function( pkg, ver )
              local test;
              test := TestPackageAvailability( pkg, ver );
              Print(test);
              return test <> fail;
            end;
            bool :=
            chck( "smallclassnr", "1.4.4"      ) and
            chck( "autodoc",      "2026.03.18" ) and
            chck( "polycyclic",   "2.17"       ) and
            chck( "groupoids",    "1.80"       ) and
            chck( "utils",        "0.92"       ) and
            chck( "grpconst",     "2.6.2"      ) and
            chck( "forms",        "1.2.14"     );
            QUIT_GAP(bool);
          GAPInput

  test-scripts:
    name: "Test the scripts used by this action"
    runs-on: ubuntu-slim

    steps:

      - name: "Check out this repository"
        uses: actions/checkout@v6

      - name: "Shellcheck"
        shell: bash
        run: shellcheck -e SC2034,SC2154 -o all *.sh
