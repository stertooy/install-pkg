name: CI

# Trigger the workflow on push to master / main, or on pull request
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: "Test on ${{ matrix.gap-version }}, separator = ${{ matrix.sep }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gap-version:
          - 'devel'
          - '4.14'
          - '4.13'
          - '4.12'
          - '4.11'
          - '4.10'
        packages:
          - 'https://github.com/gap-packages/sophus.git utils'
          - |
            utils
            https://github.com/gap-packages/grpconst/releases/download/v2.6.2/grpconst-2.6.2.tar.gz
        use-latex: ["true","false"]
        ignore-errors: ["true","false"]
        exclude:
          - packages: 'https://github.com/gap-packages/sophus.git utils'
            use-latex: 'false'
            ignore-errors: 'false'
          
    steps:
      - name: "Check out this repository"
        uses: actions/checkout@v5
        with:
          path: this-action/
      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - uses: ./this-action/
        with:
          packages: ${{ matrix.packages }}
          use-latex: ${{ matrix.use-latex }}
          ignore-errors: ${{ matrix.ignore-errors }}

