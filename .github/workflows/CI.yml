name: CI

# Trigger the workflow on push to master / main, or on pull request
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: "Test on ${{ matrix.gap-version }}, use-latex: ${{ matrix.use-latex }}, ignore-errors: ${{ matrix.ignore-errors }}"
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'herpderp' }}
    strategy:
      fail-fast: false
      matrix:
        gap-version:
          - 'devel'
          - '4.14'
          - '4.13'
          - '4.12'
          - '4.11'
          - '4.10'
        use-latex: ["true","false"]
        ignore-errors: ["true","false"]
        exclude:
          - use-latex: "false"
            ignore-errors: "false"
          
    steps:
      - name: "Check out this repository"
        uses: actions/checkout@v5
        with:
          path: this-action/
      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - uses: ./this-action/
        with:
          packages: |
            https://github.com/gap-packages/sophus.git
            utils
            https://github.com/gap-packages/grpconst/releases/download/v2.6.2/grpconst-2.6.2.tar.gz
          use-latex: ${{ matrix.use-latex }}
          ignore-errors: ${{ matrix.ignore-errors }}

  test-platforms:
    name: "Test on ${{ matrix.os }}, GAP version ${{ matrix.gap-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest] #[macos-latest, windows-latest]
        gap-version:
          - 'devel'
          #- '4.14'
          #- '4.10'
          
    steps:
      - uses: gap-actions/setup-cygwin@v2
        if: ${{ matrix.os == 'windows-latest' }}
      - name: "Check out this repository"
        uses: actions/checkout@v5
        with:
          path: this-action/
      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - shell: bash
        run: |
          gap <<GAPINPUT
          LoadPackage("PackageManager");
          Exec( "wget -O - https://github.com/gap-packages/grpconst/releases/download/v2.6.2/grpconst-2.6.2.tar.gz | tar xzf - ");
          GAPINPUT
          ls -a
      - uses: ./this-action/
        with:
          packages: |
            https://github.com/gap-packages/sophus.git
            utils
            https://github.com/gap-packages/grpconst/releases/download/v2.6.2/grpconst-2.6.2.tar.gz
