name: CI

# Trigger the workflow on push to master / main, or on pull request
on:
  push:
    branches:
      - main
  pull_request:

jobs:

  test-platforms:
    name: "Test on ${{ matrix.os }}, GAP version ${{ matrix.gap-version }}"
    runs-on: ${{ matrix.os }}
    env:
      CYGWIN: binmode   # force binary I/O under Cygwin
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        gap-version:
          - 'devel'
          - '4.14'
          - '4.10'
          
    steps:
      - uses: gap-actions/setup-cygwin@v2
        if: ${{ matrix.os == 'windows-latest' }}

      - uses: gap-actions/setup-gap@v3
        with:
          gap-version: ${{ matrix.gap-version }}
      - shell: bash
        run: |
          wget "https://github.com/gap-packages/grpconst/releases/download/v2.6.2/grpconst-2.6.2.tar.gz" -O "archive-1.tar.gz"

          echo $PWD

          /cygdrive/c/cygwin64/bin/bash.exe --login --norc -e -o pipefail -c '
          gap -A <<GAPINPUT
          LoadPackage("PackageManager":OnlyNeeded);;
          url := "https://github.com/gap-packages/grpconst/releases/download/v2.6.2/grpconst-2.6.2.tar.gz";;
          tool := [ "wget", [ "--quiet", "-O", "-" ] ];;
          exec := CallFuncList( PKGMAN_Exec, Concatenation( [ "." ], [ tool[1] ], tool[2], [ url ] ) );;
          Print( "Exit code: ", exec.code, "\n" );
          result := exec.output;;
          path := Filename( Directory("/cygdrive/c/"), "archive-2.tar.gz" );
          FileString( path, result );
          GAPINPUT
          '
          
          ls -a

          gzip -t archive-1.tar.gz && echo "gzip OK" || echo "gzip CORRUPT"
          file archive-1.tar.gz || true
          xxd -l 8 -g 1 archive-1.tar.gz || true
          tr -cd '\r' < archive-1.tar.gz | wc -c || true
          ls -lh archive-1.tar.gz || true

          gzip -t archive-2.tar.gz && echo "gzip OK" || echo "gzip CORRUPT"
          file archive-2.tar.gz || true
          xxd -l 8 -g 1 archive-2.tar.gz || true
          tr -cd '\r' < archive-2.tar.gz | wc -c || true
          ls -lh archive-2.tar.gz || true

          # Show summary checksums
          sha256sum archive-1.tar.gz archive-2.tar.gz
          
          # Show gzip metadata & CRCs (the last column is CRC32 of the uncompressed data)
          gzip -l archive-1.tar.gz
          gzip -l archive-2.tar.gz

