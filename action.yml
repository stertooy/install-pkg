name: 'Run package tests'
description: 'Run package tests'
inputs:
  packages:
    description: 'Space-separated list of packages to install'
    required: true
    default: ''
  ignore-errors:
    description: 'Ignore errors'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: "Validate input"
      shell: bash
      run: |
        echo "TODO"

    - name: "Run tests"
      shell: bash
      run: |
        # Convert newlines to spaces
        PKGS=$(echo "${{ inputs.packages }}" | tr '\n' ' ')

        error_found=false
        # Use `gap` instead of `$GAP` to avoid quitonbreak
        for pkg in $PKGS; do
          if ! gap -A <<GAPInput
            LoadPackage("PackageManager");
            QUIT_GAP(InstallPackage("${pkg}"));
          GAPInput; then
            error_found=true
            echo "::error::Installation of ${pkg} may have failed"
          fi
        done

        # Exit unless ignore-errors is set to true
        if "${{ inputs.ignore-errors }}"; then
          exit 1
        fi
          
