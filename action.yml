name: 'Install packages'
description: 'Install additional GAP packages'

inputs:
  packages:
    description: 'Space-separated list of packages to install'
    required: true
    default: ''

runs:
  using: "composite"
  steps:

    - name: Install bsdtar
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: sudo apt install -y libarchive-tools # bsdtar
    - name: Install GAP packages
      shell: bash
      run: |
        # Convert newlines to spaces
        PACKAGES=$(echo "${{ inputs.packages }}" | tr '\n' ' ')
     
        if [ "$RUNNER_OS" = "Windows" ]; then
          DEST="$HOME/_gap/pkg"
          TMPDIR=$(cygpath -u "$RUNNER_TEMP/install-pkg")
        else
          DEST="$HOME/.gap/pkg"
          TMPDIR="$RUNNER_TEMP/install-pkg"
        fi
        
        mkdir -p "$DEST"
        mkdir -p "$TMPDIR"
        
        PKG_DISTRO="$TMPDIR/package-infos.json"
        WGET_HEADER="Authorization: token ${{ github.token }}"

        ############################################
        install_from_arch() {
          url="$1"
          target="$2"
          
          echo "Installing package from $url at $target using arch."

          filename=$(basename "$url")
          archive="$TMPDIR/$filename"
          wget -qO "$archive" "$url"
          mkdir -p "$target"
          bsdtar -xf "$archive" -C "$target"
          rm "$archive"
        }

        ############################################
        prefer_archive() {
        
          base="$1" # base URL without extension
          formats="$2" # newline-separated list of available archive formats
        
          if echo "$formats" | grep -q "^\.tar\.gz$"; then
            echo "${base}.tar.gz"
          elif echo "$formats" | grep -q "^\.tar\.bz2$"; then
            echo "${base}.tar.bz2"
          elif echo "$formats" | grep -q "^\.zip$"; then
            echo "${base}.zip"
          else
            echo "::error::No supported archive format found"
            exit 1
          fi
        }

        ############################################
        install_from_json() {
          info="$1"
          target="$2"
          
          echo "Installing package from $info at $target using json."
        
          if [ ! -f "$info" ]; then
            echo "::error::Could not find package-info.json: $info"
            exit 1
          fi
        
          archive_base=$(jq -r '.ArchiveURL' "$info")
          formats=$(jq -r '.ArchiveFormats' "$info")
          formats=$(echo "$formats" | tr ' ' '\n')
          archive_url=$(prefer_archive "$archive_base" "$formats")
          install_from_arch "$archive_url" "$target"
        }

        ############################################
        install_from_repo() {
          repo="$1"
          version="$2"
          target="$3"

          echo "Installing $repo (version: $version) at $target using repo."
        
          # If version is "devel", clone default branch
          if [ "$version" = "devel" ]; then
            echo "Cloning development branch of $repo"
            git clone "https://github.com/$repo.git" "$target"
            return
          fi
        
          if [ "$version" = "latest" ]; then
            echo "Fetching latest release for $repo"
            wget --header="$WGET_HEADER" -qO "$TMPDIR/release.json" \
              "https://api.github.com/repos/$repo/releases/latest"
          else
            echo "Selecting oldest release >= $version"
            wget --header="$WGET_HEADER" -qO "$TMPDIR/releases.json" \
              "https://api.github.com/repos/$repo/releases"
        
            release=$(jq -c --arg v "$version" '
              map(. + {ver:(.tag_name|sub("^v";""))})
              | sort_by(.ver)
              | map(select(.ver >= $v))
              | .[0]
            ' "$TMPDIR/releases.json")
        
            if [ "$release" = "null" ] || [ -z "$release" ]; then
              echo "::error::No release >= $version found"
              exit 1
            fi
        
            echo "$release" > "$TMPDIR/release.json"
            rm "$TMPDIR/releases.json"
          fi
          
          asset_url=$(jq -r '
            .assets[]
            | select(.name=="package-info.json")
            | .browser_download_url
          ' "$TMPDIR/release.json")
          rm "$TMPDIR/release.json"
        
          if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "::error::Release has no package-info.json asset"
            exit 1
          fi

          info="$TMPDIR/package-info.json"
          wget -qO "$info" "$asset_url"

          archive_base=$(jq -r '.ArchiveURL' "$info")
          formats=$(jq -r '.ArchiveFormats' "$info")
          formats=$(echo "$formats" | tr ' ' '\n')
          rm "$info"
          
          archive_url=$(prefer_archive "$archive_base" "$formats")
          install_from_arch "$archive_url" "$target"
        }

        ############################################
        load_package_distro() {
          if [ ! -f "$PKG_DISTRO" ]; then
            # echo "Downloading packages-infos.json from PackageDistro"
            distro="$TMPDIR/package-infos.json.gz"
            wget -qO "$distro" "https://github.com/gap-system/PackageDistro/releases/download/latest/package-infos.json.gz"
            gunzip "$distro"
            if [ ! -s "$PKG_DISTRO" ]; then
              echo "::error::package-infos.json could not be obtained"
              exit 1
            fi
          fi
        }

        ############################################
        get_repo_from_name() {
          name="$1"
        
          load_package_distro
        
          pkg=$(jq -c --arg n "$name" '.[$n]' "$PKG_DISTRO")
        
          if [ "$pkg" = "null" ] || [ -z "$pkg" ]; then
            echo "::error::Package $name not found in PackageDistro"
            exit 1
          fi
        
          # Don't try to get URL from PackageDistro - may not be merged yet!
          repo=$(echo "$pkg" | jq -r '.SourceRepository.URL')
          repo=${repo#https://github.com/}

          echo $repo
        }

        #####################

        build_pkg() {
          echo "TODO - build package here"
        }

        check_pkg_availability() {
          pkg="$1"
          ver="$2"
          echo "BEFORE"
          gap <<GAPINPUT
            QuitGap( TestPackageAvailability( "$pkg", "$ver" ) <> fail );
        GAPINPUT
          echo "AFTER"
          return $?
        }

        ############################################
        for pkg in $PACKAGES; do
          echo "::group::Installing $pkg"
          
          base=$(basename "$pkg")
          name=${base%%.*}
          name=$(echo "$name" | tr '[:upper:]' '[:lower:]')
          pkgdir="$DEST/$name"

          if [[ "$pkg" =~ ^https?://.*\.(tar\.gz|tar\.bz2|zip)$ ]]; then
            echo "Input is an archive"
            install_from_arch "$pkg" "$pkgdir"
          else
            version="latest"

            if [[ "$pkg" == *@* ]]; then
              version="${pkg##*@}"
              pkg="${pkg%@*}"
            fi
            
            # Check if package is already available
            #if [ "$version" != "latest" ] && [ "$version" != "devel" ]; then
              #if check_pkg_availability $name $version; then
              #  echo "Package $name $version is already available, skipping."
              #  continue
              #else
              #  echo "Package $name $version not yet available, installing."
              #fi
            #fi

            if [[ "$pkg" =~ .*/.* ]]; then
              echo "Input is a package repository"
              repo="$pkg"
            else
              echo "Input is a package name"
              echo "name: $name"
              repo=$(get_repo_from_name $name)
              echo "repo: $repo" 
            fi
            
            install_from_repo "$repo" "$version" "$pkgdir"
          fi
        
          echo "Building package in $pkgdir"
        
          (
            cd "$pkgdir" || {
              echo "Directory $pkgdir not found"
              exit 1
            }
            echo "now inside $pkgdir"
            build_pkg
          )
        
        done
