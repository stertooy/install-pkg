name: 'Install packages'
description: 'Install additional GAP packages'

inputs:
  packages:
    description: 'Space-separated list of packages to install'
    required: true
    default: ''

runs:
  using: "composite"
  steps:
    - name: Install GAP packages
      shell: bash
      run: |
        # Convert newlines to spaces
        PACKAGES=$(echo "${{ inputs.packages }}" | tr '\n' ' ')

        DEST="$HOME/.gap/pkg"
        mkdir -p "$DEST"

        TMPDIR=$(mktemp -d)
        PKG_DISTRO="$TMPDIR/package-infos.json"

        ############################################
        download_and_extract() {
          url="$1"
          archive="$TMPDIR/archive"

          echo "Downloading $url"

          wget -qO "$archive" "$url"

          case "$url" in
            *.tar.gz)  tar -xzf "$archive" -C "$DEST" ;;
            *.tar.bz2) tar -xjf "$archive" -C "$DEST" ;;
            *.zip)     unzip -q "$archive" -d "$DEST" ;;
            *) echo "Unsupported archive: $url"; exit 1 ;;
          esac
        }

        ############################################
        prefer_archive() {
          base="$1"
          formats="$2"

          if echo "$formats" | grep -q tar.gz; then
            echo "${base}.tar.gz"
          elif echo "$formats" | grep -q tar.bz2; then
            echo "${base}.tar.bz2"
          else
            echo "${base}.zip"
          fi
        }

        ############################################
        resolve_package_info() {
          url="$1"
          info="$TMPDIR/package-info.json"

          wget -qO "$info" "$url"

          archive_base=$(jq -r '.ArchiveURL // empty' "$info")
          formats=$(jq -r '.ArchiveFormats[]? // empty' "$info")

          archive=$(prefer_archive "$archive_base" "$formats")

          download_and_extract "$archive"
        }

        ############################################
        github_latest_tag() {
          repo="$1"
          wget -qO- "https://api.github.com/repos/$repo/releases/latest" \
            | jq -r '.tag_name'
        }

        ############################################
        github_release_tags() {
          repo="$1"
          wget -qO- "https://api.github.com/repos/$repo/releases" \
            | jq -r '.[].tag_name'
        }

        ############################################
        find_release_for_version() {
          repo="$1"
          version="$2"

          github_release_tags "$repo" \
            | sed 's/^v//' \
            | sort -V \
            | awk -v v="$version" '$0>=v {print; exit}'
        }

        ############################################
        install_from_repo() {
          repo="$1"
          version="${2:-}"

          if [ -z "$version" ]; then
            tag=$(github_latest_tag "$repo")
          else
            tag=$(find_release_for_version "$repo" "$version")
          fi

          echo "Using release $tag"

          info_url="https://raw.githubusercontent.com/$repo/$tag/package-info.json"

          resolve_package_info "$info_url"
        }

        ############################################
        load_package_distro() {
          if [ ! -f "$PKG_DISTRO" ]; then
            wget -qO "$TMPDIR/pkgs.json.gz" \
              https://github.com/gap-system/PackageDistro/releases/download/latest/package-infos.json.gz
            gunzip "$TMPDIR/pkgs.json.gz"
            mv "$TMPDIR/pkgs.json" "$PKG_DISTRO"
          fi
        }

        ############################################
        install_from_name() {
          name="$1"
          version="${2:-}"

          load_package_distro

          pkg=$(jq -c --arg n "$name" \
            '.Packages[] | select(.PackageName==$n)' \
            "$PKG_DISTRO")

          if [ -z "$pkg" ]; then
            echo "Package $name not found"
            exit 1
          fi

          distro_version=$(echo "$pkg" | jq -r '.Version')

          if [ -z "$version" ] || [ "$version" = "$distro_version" ]; then

            archive_base=$(echo "$pkg" | jq -r '.ArchiveURL')
            formats=$(echo "$pkg" | jq -r '.ArchiveFormats[]?')

            archive=$(prefer_archive "$archive_base" "$formats")

            download_and_extract "$archive"

          else

            repo=$(echo "$pkg" | jq -r '.SourceRepository')
            repo=${repo#https://github.com/}

            install_from_repo "$repo" "$version"

          fi
        }

        ############################################
        for pkg in $PACKAGES; do
          echo "Now handling $pkg"
          version=""

          if [[ "$pkg" == *@* ]]; then
            echo "Found a version"
            version="${pkg##*@}"
            pkg="${pkg%@*}"
          fi

          if [[ "$pkg" =~ ^https?://.*\.(tar\.gz|tar\.bz2|zip)$ ]]; then
            echo "Detected archive"
            download_and_extract "$pkg"

          elif [[ "$pkg" =~ .*/.* ]]; then

            echo "Detected repository"
            install_from_repo "$pkg" "$version"

          else

            echo "Detected package name"
            install_from_name "$pkg" "$version"

          fi

        done
