name: 'Install packages'
description: 'Install additional GAP packages'

inputs:
  packages:
    description: 'Space-separated list of packages to install'
    required: true
    default: ''

runs:
  using: "composite"
  steps:
    - name: Install GAP packages
      shell: bash
      run: |
        # Convert newlines to spaces
        PACKAGES=$(echo "${{ inputs.packages }}" | tr '\n' ' ')

        DEST="$HOME/.gap/pkg"
        mkdir -p "$DEST"

        TMPDIR=$(mktemp -d)
        PKG_DISTRO="$TMPDIR/package-infos.json"

        ############################################
        download_and_extract() {
          url="$1"
          archive="$TMPDIR/archive"

          echo "Downloading $url"

          wget -O "$archive" "$url"

          case "$url" in
            *.tar.gz)  tar -xzf "$archive" -C "$DEST" ;;
            *.tar.bz2) tar -xjf "$archive" -C "$DEST" ;;
            *.zip)     unzip -q "$archive" -d "$DEST" ;;
            *) echo "Unsupported archive: $url"; exit 1 ;;
          esac

          echo "Checking $DEST" for files?
          ls -a $DEST
        }

        ############################################
        prefer_archive() {
          base="$1"
          formats="$2"   # formats: multiple lines
        
          if echo "$formats" | grep -q "^\.tar\.gz$"; then
            echo "${base}.tar.gz"
          elif echo "$formats" | grep -q "^\.tar\.bz2$"; then
            echo "${base}.tar.bz2"
          elif echo "$formats" | grep -q "^\.zip$"; then
            echo "${base}.zip"
          else
            echo "No supported archive format found in: $formats"
            exit 1
          fi
        }

        ############################################
        resolve_package_info() {
        
          info="$1"
        
          if [ ! -f "$info" ]; then
            echo "package-info.json not found: $info"
            exit 1
          fi
        
          archive_base=$(jq -r '.ArchiveURL' "$info")
          formats=$(jq -r '.ArchiveFormats' "$info")
          formats=$(echo "$formats" | tr ' ' '\n')
          archive_url=$(prefer_archive "$archive_base" "$formats")
        
          echo "Downloading package archive: $archive_url"
        
          download_and_extract "$archive_url"
        }

        ############################################
        github_latest_tag() {
          repo="$1"
          wget -O- "https://api.github.com/repos/$repo/releases/latest" \
            | jq -r '.tag_name'
        }

        ############################################
        github_release_tags() {
          repo="$1"
          wget -O- "https://api.github.com/repos/$repo/releases" \
            | jq -r '.[].tag_name'
        }

        ############################################
        find_release_for_version() {
          repo="$1"
          version="$2"

          github_release_tags "$repo" \
            | sed 's/^v//' \
            | sort -V \
            | awk -v v="$version" '$0>=v {print; exit}'
        }

        ############################################
        install_from_repo() {
        
          repo="$1"
          version="$2"
        
          # If version is "latest", treat as empty
          if [ "$version" = "latest" ]; then
            version=""
          fi
        
          # If version is "dev" or "devel", clone default branch
          if [ "$version" = "dev" ] || [ "$version" = "devel" ]; then
            echo "Cloning development branch of $repo"
            git clone "https://github.com/$repo.git" "$DEST/$(basename $repo)"
            return
          fi
        
          if [ -z "$version" ]; then
            echo "Fetching latest release for $repo"
            wget -O "$TMPDIR/release.json" \
              "https://api.github.com/repos/$repo/releases/latest"
          else
            echo "Selecting release >= $version"
            wget -O "$TMPDIR/releases.json" \
              "https://api.github.com/repos/$repo/releases"
        
            release=$(jq -c --arg v "$version" '
              map(. + {ver:(.tag_name|sub("^v";""))})
              | sort_by(.ver)
              | map(select(.ver >= $v))
              | .[0]
            ' "$TMPDIR/releases.json")
        
            if [ "$release" = "null" ] || [ -z "$release" ]; then
              echo "No release >= $version found"
              exit 1
            fi
        
            echo "$release" > "$TMPDIR/release.json"
          fi
        
          echo "Locating package-info.json asset"
        
          asset_url=$(jq -r '
            .assets[]
            | select(.name=="package-info.json")
            | .browser_download_url
          ' "$TMPDIR/release.json")
        
          if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "package-info.json asset not found"
            exit 1
          fi
        
          echo "Downloading package-info.json"
          wget -O "$TMPDIR/package-info.json" "$asset_url"
        
          echo "Resolving archive from package-info.json"
          resolve_package_info "$TMPDIR/package-info.json"
        }

        ############################################
        load_package_distro() {
          if [ ! -f "$PKG_DISTRO" ]; then
        
            url="https://github.com/gap-system/PackageDistro/releases/download/latest/package-infos.json.gz"
        
            echo "Downloading package list from $url"
        
            wget -O "$TMPDIR/package-infos.json.gz" "$url" || {
              echo "Failed to download package-infos.json.gz"
              exit 1
            }
        
            echo "Extracting package-infos.json"
        
            gunzip -v -c "$TMPDIR/package-infos.json.gz" > "$PKG_DISTRO" || {
              echo "gunzip failed"
              exit 1
            }
        
            if [ ! -s "$PKG_DISTRO" ]; then
              echo "package-infos.json extraction failed"
              exit 1
            fi
          fi
        }

        ############################################
        install_from_name() {
        
          name=$(echo "$1" | tr '[:upper:]' '[:lower:]')
          version="${2:-}"
        
          # normalize version aliases
          if [ "$version" = "latest" ]; then
            version=""
          fi
        
          load_package_distro
        
          pkg=$(jq -c --arg n "$name" '.[$n]' "$PKG_DISTRO")
        
          if [ "$pkg" = "null" ] || [ -z "$pkg" ]; then
            echo "Package $name not found"
            exit 1
          fi
        
          distro_version=$(echo "$pkg" | jq -r '.Version // empty')
        
          if [ -z "$version" ] || [ "$version" = "$distro_version" ]; then
        
            archive_base=$(echo "$pkg" | jq -r '.ArchiveURL')
            formats=$(echo "$pkg" | jq -r '.ArchiveFormats')
            formats=$(echo "$formats" | tr ' ' '\n')
        
            archive_url=$(prefer_archive "$archive_base" "$formats")
            download_and_extract "$archive_url"
        
          else
            # "dev"/"devel" or other version → install from repo
            repo=$(echo "$pkg" | jq -r '.SourceRepository.URL')
            repo=${repo#https://github.com/}
        
            echo "Using repository $repo"
            install_from_repo "$repo" "$version"
          fi
        }

        ############################################
        for pkg in $PACKAGES; do
          echo "Now handling $pkg"
          version=""

          if [[ "$pkg" == *@* ]]; then
            echo "Found a version"
            version="${pkg##*@}"
            pkg="${pkg%@*}"
          fi

          if [[ "$pkg" =~ ^https?://.*\.(tar\.gz|tar\.bz2|zip)$ ]]; then
            echo "Detected archive"
            download_and_extract "$pkg"

          elif [[ "$pkg" =~ .*/.* ]]; then

            echo "Detected repository"
            install_from_repo "$pkg" "$version"

          else

            echo "Detected package name"
            install_from_name "$pkg" "$version"

          fi

        done
