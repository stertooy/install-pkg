name: 'Install packages'
description: 'Install additional GAP packages'
inputs:
  packages:
    description: 'Space-separated list of packages to install'
    required: true
    default: ''
  ignore-errors:
    description: 'Ignore errors when installing'
    required: false
    default: 'false'
  use-latex:
    description: "Install and use latex (only works on Linux)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: "Validate input"
      shell: bash
      run: |
        validate_boolean() {
          local input=$1
          local option_name=$2
          if ! [[ "$input" =~ ^(true|false)$ ]]; then
            echo "::error::Invalid value for option $option_name. Expected 'true' or 'false', but found '$input'"
            exit 1;
          fi
        }

        validate_boolean "${{ inputs.ignore-errors }}" ignore-errors
        validate_boolean "${{ inputs.use-latex }}" use-latex

    - name: "Install TeX Live"
      if: ${{ inputs.use-latex == 'true' }}
      shell: bash
      run: |
        sudo apt-get install --no-install-recommends texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

    - name: "Install packages"
      shell: bash
      run: |
        # Convert newlines to spaces
        PKGS=$(echo "${{ inputs.packages }}" | tr '\n' ' ')

        error_found=false
        # Use `gap` instead of `$GAP` to avoid quitonbreak
        for pkg in $PKGS; do
          if ! gap -A <<GAPInput
            LoadPackage("PackageManager");

            if "${{ runner.os }}" = "Windows" then
              # Overwrite InstallPackageFromArchive
              MakeReadWriteGlobal("InstallPackageFromArchive");
              InstallPackageFromArchive := function( url )
                local url_parts, filename, ext, basename, dir;

                # Download and extract url
                url_parts := SplitString( url, "/" );
                filename := url_parts[Length( url_parts )];
                for ext in PKGMAN_ArchiveFormats do
                  if EndsWith( filename, ext ) then
                    basename := filename{[1..Length(filename)-Length(ext)]};
                  fi;
                od;
                Exec(Concatenation(
                  "wget -O - ",
                  url,
                  " | tar -xf - -C ",
                  PKGMAN_PackageDir()
                ));
                dir := Filename( Directory( PKGMAN_PackageDir() ), basename );

                # Install dependencies
                if PKGMAN_InstallDependencies(dir) <> true then
                  Info(InfoPackageManager, 1, "Dependencies not satisfied for ", basename);
                  PKGMAN_RemoveDir(dir);
                  return false;
                fi;

                # Check validity
                if PKGMAN_CheckPackage(dir) = false then
                  PKGMAN_RemoveDir(dir);
                  return false;
                fi;
                PKGMAN_RefreshPackageInfo();
                return true;
              end;
            fi;

          QUIT_GAP(InstallPackage("${pkg}"));
        GAPInput
          then
            error_found=true
            echo "::error::Installation of ${pkg} may have failed"
          fi
        done

        # Exit unless ignore-errors is set to true
        if [[ "${{ inputs.ignore-errors }}" != "true" && "$error_found" = "true" ]]; then
          exit 1
        fi
