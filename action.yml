name: 'Install packages'
description: 'Install additional GAP packages'
inputs:
  packages:
    description: 'Space-separated list of packages to install'
    required: true
    default: ''
  ignore-errors:
    description: 'Ignore errors when installing'
    required: false
    default: 'false'
  use-latex:
    description: "Install and use latex (only works on Linux)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: "Install TeX Live"
      if: ${{ inputs.use-latex == 'true' }}
      shell: bash
      run: |
        sudo apt-get install --no-install-recommends texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

    - name: "Run tests"
      shell: bash
      run: |
        # Convert newlines to spaces
        PKGS=$(echo "${{ inputs.packages }}" | tr '\n' ' ')

        error_found=false
        # Use `gap` instead of `$GAP` to avoid quitonbreak
        for pkg in $PKGS; do
          if ! gap -A <<GAPInput
            LoadPackage("PackageManager");

            # Add function from later versions of PackageManager, if needed
            if not IsBound("PKGMAN_TarTopDirectory") then
                PKGMAN_TarTopDirectory := function( path )
                    local tar, options, exec, files, topdir;
                    tar := PKGMAN_Exec( ".", "tar", "--version" );
                    if StartsWith( tar.output, "tar (GNU tar)" ) then
                        options := "--warning=none";
                    else
                        options := "";
                    fi;
                    exec := PKGMAN_Exec( ".", "tar", options, "-tf", path );
                    if exec.code <> 0 then
                        Info( InfoPackageManager, 1, "Could not inspect tarball contents" );
                        return fail;
                    fi;
                    files := SplitString( exec.output, "", "\n" );
                    topdir := Set( files, function ( f )
                            return SplitString( f, "/" )[1];
                        end );
                    if Length( topdir ) <> 1 then
                        Info( InfoPackageManager, 1, "Archive should contain 1 directory (not ", Length( topdir ), ")" );
                        return fail;
                    fi;
                    return topdir[1];
                end;
            fi;

            # Overwrite InstallPackageFromArchive
            MakeReadWriteGlobal("InstallPackageFromArchive");
            InstallPackageFromArchiveNEW := function( url )
                local url_parts, filename, basename, dir;
                    
                url_parts := SplitString( url, "/" );
                filename := url_parts[Length( url_parts )];
                basename := filename{[1..Length(filename)-7]}; # remove .tar.gz
                
            
                Exec(Concatenation(
                    "wget -O - ",
                    url,
                    " | tar -xzf - -C ",
                    PKGMAN_PackageDir(  )
                ) );
            
            
                dir := Filename( Directory( PKGMAN_PackageDir() ), basename );
                
                # Install dependencies
                if PKGMAN_InstallDependencies(dir) <> true then
                    Info(InfoPackageManager, 1, "Dependencies not satisfied for ", topdir);
                    PKGMAN_RemoveDir(dir);
                    return false;
                fi;
            
                # Check validity
                if PKGMAN_CheckPackage(dir) = false then
                    PKGMAN_RemoveDir(dir);
                    return false;
                fi;
                PKGMAN_RefreshPackageInfo();
            
                return true;
            end;

            QUIT_GAP(InstallPackage("${pkg}"));
        GAPInput
          then
            error_found=true
            echo "::error::Installation of ${pkg} may have failed"
          fi
        done

        # Exit unless ignore-errors is set to true
        if [[ "${{ inputs.ignore-errors }}" != "true" && "$error_found" = "true" ]]; then
          exit 1
        fi
